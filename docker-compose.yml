version: "3.9"

services:
  # ── Reverse Proxy ─────────────────────────────────────────────
  sispos-nginx:
    image: nginx:1.25-alpine
    container_name: sispos-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - sispos-backend
      - sispos-frontend
    restart: unless-stopped
    networks:
      - sispos-network

  # ── Backend (Node.js + Express) ────────────────────────────────
  sispos-backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: sispos-backend
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      FRONTEND_URL: ${FRONTEND_URL}
      PORT: 3000
      NODE_ENV: ${NODE_ENV:-development}
    depends_on:
      sispos-db:
        condition: service_healthy
      sispos-redis:
        condition: service_healthy
    restart: unless-stopped
    volumes:
      - ./backend/src:/app/src
      - ./prisma:/app/prisma
    networks:
      - sispos-network

  # ── Frontend (React + Vite) ────────────────────────────────────
  sispos-frontend:
    build:
      context: ./frontend
    container_name: sispos-frontend
    environment:
      VITE_API_BASE_URL: /api
      VITE_SOCKET_URL: /
    restart: unless-stopped
    volumes:
      - ./frontend/src:/app/src
    networks:
      - sispos-network

  # ── PostgreSQL 16 ──────────────────────────────────────────────
  sispos-db:
    image: postgres:16-alpine
    container_name: sispos-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sispos}
      POSTGRES_USER: ${POSTGRES_USER:-sispos_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sispos_user} -d ${POSTGRES_DB:-sispos}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sispos-network

  # ── Redis 7 ───────────────────────────────────────────────────
  sispos-redis:
    image: redis:7-alpine
    container_name: sispos-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - sispos-network

networks:
  sispos-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
